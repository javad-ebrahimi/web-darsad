<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>Web Darsad</title>
  </head>
  <body>

    
    <div class="heder">
      <a href="index-1.html" style="display: block;"> New</a>
      <input placeholder="اختلاف و خارج تعهد" class="ekhtelaf-input" >
      <input placeholder=" % درصد"  class="darsad-input">
      <input placeholder="مبلغ قابل پرداخت" class="total-input">
      <input placeholder="جمع اقلام آزاد" class="azad-input" >
      <p class="fany-text">حق فنی<input type="checkbox" class="checkbox-input"></p>

      <button class="button-total" onclick="total()">equals</button>
      <output class="output-moshtary"></output>
      <div class="site-copy">
        <output class="output-site"></output>
        <button onclick="copy()" class="copy-button hide">Copy</button>
      </div>
      <output class="All"></output>
    </div>
    
    
    

  </body>
  <script>

    document.addEventListener('contextmenu', event => event.preventDefault());

    let site;
    let azad=0;
     //فنی
    const fany =336000

    function total(){

      //گرفتن اختلاف
      const ek=document.querySelector('.ekhtelaf-input');
      let ekhtelaf = ek.value;

      //گرفتن درصد
      const dr = document.querySelector('.darsad-input');
      let darsad = dr.value;

        //گرفتن مبلغ آزاد
        const az = document.querySelector('.azad-input');
        azad = az.value;

      // حساب کردن مبلغ مشتری
      let moshtary = ((Number(ekhtelaf)-Number(azad)) * (Number(darsad)/100)) + Number(azad);

      //گرفتن مبلغ قابل پرداخت
      const tl = document.querySelector('.total-input');
      let total = tl.value;

    
       //تشخیص حق فنی
      const ck = document.querySelector('.checkbox-input');
      let checkbox = ck.checked;
      

      //محاسبه فنی
      if (checkbox==false){
        moshtary+=fany;
      }

       //حساب کردن مبلغ سایت
      site = Number(total) - Number(moshtary);


      //نشان دادن مبلغ مشتری
      document.querySelector('.output-moshtary').innerHTML = `moshtary = ${(parseInt(moshtary)).toLocaleString('en-US')+ '  ریال' }`;

      //نشان دادن مبلغ سایت
      document.querySelector('.output-site').innerHTML = `site = ${parseInt(site)}`;
     

      //نشان دادن همه
      document.querySelector('.All').innerHTML = `ALL = ${moshtary.toLocaleString('en-US')} + ${site.toLocaleString('en-US')} =  ${(moshtary+site).toLocaleString('en-US')} `

      document.querySelector('.hide').classList.remove('hide');
    }

    function copy(){
      navigator.clipboard.writeText(`${site}`);
      alert(`"کپی شد" ${site}`);
     
      
    }
    
    
    
  </script>

</html>
